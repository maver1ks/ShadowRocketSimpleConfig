# @tatarinovms
[General]
# URL для автоматического обновления конфигурации
update-url = https://raw.githubusercontent.com/tatarinovms/ShadowRocketSimpleConfig/master/baseline.conf
# Обход системного прокси для локальных подключений
bypass-system = true
# Отключение IPv6 для избежания проблем с совместимостью
ipv6 = false
# Предпочтение IPv4 над IPv6
prefer-ipv6 = false
# Ответ на запросы приватных IP адресов
private-ip-answer = true
# Отключение прямого системного DNS
dns-direct-system = false
# Использование системного DNS как резервного
dns-fallback-system = true
# Основные DNS серверы (Google и AdGuard)
dns-server = https://dns.google/dns-query, https://dns.adguard-dns.com/dns-query
# Резервный DNS сервер (системный)
fallback-dns-server = system
# Перехват DNS запросов на порт 53
hijack-dns = :53
# Исключения из прокси (локальные сети и Apple сервисы)
skip-proxy = 192.168.0.0/16,localhost,*.local,captive.apple.com

[Rule]
RULE-SET,https://raw.githubusercontent.com/tatarinovms/ShadowRocketSimpleConfig/master/litsts/stream.list,PROXY
RULE-SET,https://raw.githubusercontent.com/tatarinovms/ShadowRocketSimpleConfig/master/litsts/ai.list,PROXY
RULE-SET,https://raw.githubusercontent.com/tatarinovms/ShadowRocketSimpleConfig/master/litsts/main.list,PROXY
RULE-SET,https://raw.githubusercontent.com/tatarinovms/ShadowRocketSimpleConfig/master/litsts/meta.list,PROXY
RULE-SET,https://raw.githubusercontent.com/tatarinovms/ShadowRocketSimpleConfig/master/litsts/payments.list,PROXY
RULE-SET,https://raw.githubusercontent.com/tatarinovms/ShadowRocketSimpleConfig/master/litsts/PSN.list,PROXY
RULE-SET,https://raw.githubusercontent.com/tatarinovms/ShadowRocketSimpleConfig/master/litsts/telegram.list,PROXY
RULE-SET,https://raw.githubusercontent.com/tatarinovms/ShadowRocketSimpleConfig/master/litsts/voice_ports.list,PROXY
RULE-SET,https://raw.githubusercontent.com/tatarinovms/ShadowRocketSimpleConfig/master/litsts/whatsapp_cidr_ipv4.list,PROXY
# Все остальные подключения идут напрямую
FINAL,DIRECT
